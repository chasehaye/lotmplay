name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ env.REPO }}/player-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx (frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ghcr.io/${{ env.REPO }}/player-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TTS image only rebuilds when tts/ changes (it's large due to PyTorch)
      - name: Check if tts/ changed
        id: tts-changed
        uses: tj-actions/changed-files@v44
        with:
          files: tts/**

      - name: Build and push TTS
        if: steps.tts-changed.outputs.any_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./tts
          push: true
          tags: ghcr.io/${{ env.REPO }}/player-tts:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /srv/player
            echo "GITHUB_REPO=${{ github.repository }}" >> .env
            docker compose pull
            docker compose up -d
            # Run EF migrations using the bundled migrator
            docker compose exec -T server ./efbundle --connection "$DATABASE_URL" || true
